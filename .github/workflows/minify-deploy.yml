name: Minify & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "admin.html"
      - "script.js"
      - "admin.js"
      - "styles.css"
      - "sw.js"
      - "assets/**"
      - "TeloCorp/**"
      - "manifest.json"
      - "robots.txt"
      - "sitemap.xml"

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install minification tools
        run: |
          npm install --global \
            terser \
            clean-css-cli \
            html-minifier-terser

      # ── Minify JavaScript ────────────────────────────────────────────────────
      - name: Minify script.js
        run: |
          terser script.js \
            --compress \
            --mangle \
            --output script.min.js
          echo "script.js: $(wc -c < script.js) bytes → $(wc -c < script.min.js) bytes (minified)"

      - name: Minify admin.js
        run: |
          terser admin.js \
            --compress \
            --mangle \
            --output admin.min.js
          echo "admin.js: $(wc -c < admin.js) bytes → $(wc -c < admin.min.js) bytes (minified)"

      # ── Minify CSS ───────────────────────────────────────────────────────────
      - name: Minify styles.css
        run: |
          cleancss \
            -O2 \
            --output styles.min.css \
            styles.css
          echo "styles.css: $(wc -c < styles.css) bytes → $(wc -c < styles.min.css) bytes (minified)"

      # ── Minify HTML & rewrite asset references ───────────────────────────────
      - name: Minify index.html (swap to minified assets)
        run: |
          # Replace references to unminified files in the HTML source
          sed 's|href="styles.css"|href="styles.min.css"|g; s|src="script.js"|src="script.min.js"|g' index.html \
          | html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-optional-tags \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --minify-css true \
              --minify-js true \
              --output index.html.min
          echo "index.html: $(wc -c < index.html) bytes → $(wc -c < index.html.min) bytes (minified)"

      - name: Minify admin.html (swap to minified assets)
        run: |
          sed 's|href="styles.css"|href="styles.min.css"|g; s|src="script.js"|src="script.min.js"|g; s|src="admin.js"|src="admin.min.js"|g' admin.html \
          | html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --minify-css true \
              --minify-js true \
              --output admin.html.min
          echo "admin.html: $(wc -c < admin.html) bytes → $(wc -c < admin.html.min) bytes (minified)"

      # ── Prepare deployment folder ─────────────────────────────────────────────
      - name: Assemble dist/
        run: |
          mkdir -p dist

          # Minified core files
          cp index.html.min dist/index.html
          cp admin.html.min dist/admin.html
          cp script.min.js  dist/script.min.js
          cp admin.min.js   dist/admin.min.js
          cp styles.min.css dist/styles.min.css

          # Keep original files too (for reference / source maps future use)
          cp script.js  dist/script.js
          cp admin.js   dist/admin.js
          cp styles.css dist/styles.css

          # Static assets (unmodified)
          cp manifest.json dist/
          cp sw.js         dist/
          cp robots.txt    dist/
          cp sitemap.xml   dist/
          cp CNAME         dist/
          cp -r assets     dist/assets
          cp -r TeloCorp   dist/TeloCorp

      # ── Size report ──────────────────────────────────────────────────────────
      - name: Print size savings
        run: |
          echo "=== SIZE SAVINGS ==="
          echo "script.js:  $(du -sh script.js | cut -f1) → $(du -sh script.min.js | cut -f1)"
          echo "admin.js:   $(du -sh admin.js | cut -f1) → $(du -sh admin.min.js | cut -f1)"
          echo "styles.css: $(du -sh styles.css | cut -f1) → $(du -sh styles.min.css | cut -f1)"
          echo "index.html: $(du -sh index.html | cut -f1) → $(du -sh index.html.min | cut -f1)"
          echo "admin.html: $(du -sh admin.html | cut -f1) → $(du -sh admin.html.min | cut -f1)"

      # ── Deploy to gh-pages ───────────────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "ci: deploy minified build from ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
